name: CI

on:
  push:
  pull_request:

jobs:
  build-fastapi:
    name: FastAPI CI

    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5433/testdatabase
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5433/testdatabase
      ACCESS_SECRET_KEY: ci-access-secret
      RESET_PASSWORD_SECRET_KEY: ci-reset-secret
      VERIFICATION_SECRET_KEY: ci-verification-secret
      CORS_ORIGINS: '["http://localhost:3000"]'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdatabase
        ports:
          - 5433:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install the project
        working-directory: ./fastapi_backend
        run: uv sync --all-extras --dev

      - name: Run tests
        working-directory: ./fastapi_backend
        run: uv run coverage run -m pytest

      - name: Generate XML coverage report
        working-directory: ./fastapi_backend
        run: uv run coverage xml -o coverage.xml

  build-frontend:
    name: Next.js CI

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: ./nextjs-frontend
        run: pnpm install

      - name: Run tests
        working-directory: ./nextjs-frontend
        run: pnpm run coverage
